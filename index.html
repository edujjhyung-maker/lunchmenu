<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냠냠! 오늘의 급식 알리미 🍱</title>
    <link rel="stylesheet" href="style.css">
    <!-- 구글 폰트: 주아(Jua)체 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 상단 헤더 -->
        <header>
            <div class="character-avatar">🎒✨</div>
            <h1>냠냠 오늘의 급식</h1>
            <div class="date-selector-wrap">
                <input type="date" id="date-picker" class="date-picker">
            </div>
        </header>

        <main>
            <!-- 선생님/캐릭터의 피드백 메시지 공간 -->
            <section class="feedback-card">
                <div class="feedback-avatar">👩‍🏫</div>
                <div class="feedback-bubble">
                    <p id="feedback-text">오늘의 급식 메뉴가 나왔어요! 골고루 맛있게 먹어보아요. 🍚</p>
                </div>
            </section>

            <!-- 오늘의 식단 카드 (인터랙티브 리스트) -->
            <section class="card meal-card">
                <h2>🍱 내가 더 먹은 반찬은?</h2>
                <p class="data-note">더 받은 반찬의 + 버튼을 눌러보세요!</p>
                <div id="loading-msg" class="status-msg">보글보글 맛있는 급식 정보를 가져오는 중... 🍳</div>
                <div id="interactive-meal-list" class="interactive-meal-list">
                    <!-- 자바스크립트가 여기에 메뉴와 버튼을 만들어줍니다. -->
                </div>
            </section>

            <!-- 최종 영양 및 열량 정보 카드 -->
            <section class="info-grid">
                <div class="card info-card calorie-box">
                    <h2>⚡ 나의 총 열량</h2>
                    <div class="calorie-value">
                        <span id="cal-num">0</span> <span class="unit">kcal</span>
                    </div>
                </div>

                <div class="card info-card nutrition-box">
                    <h2>🌾 총 영양성분</h2>
                    <div class="nut-row"><span>탄수화물:</span> <span><strong id="nut-carbo">0</strong> g</span></div>
                    <div class="nut-row"><span>단백질:</span> <span><strong id="nut-protein">0</strong> g</span></div>
                    <div class="nut-row"><span>지방:</span> <span><strong id="nut-fat">0</strong> g</span></div>
                </div>
            </section>

            <!-- 알레르기 안내 카드 -->
            <section class="card allergy-card">
                <h2>🛑 알레르기 조심판</h2>
                <p id="allergy-summary" class="allergy-summary">급식을 불러오면 알레르기 정보가 표시돼요.</p>
            </section>
        </main>

        <footer>
            <p>스스로 조절하며 먹는 멋진 어린이가 됩시다! 💪🌟</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
